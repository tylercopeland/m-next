name: TableDropdown
description: A reusable dropdown component for selecting tables with consistent formatting logic
props:
  - name: tableList
    type: array
    description: Array of table objects to display in dropdown
    required: false
  - name: selectedTableName
    type: string
    description: The name of the currently selected table
    required: false
  - name: onChange
    type: function
    description: Callback function called when table selection changes
    required: true
  - name: loading
    type: boolean
    description: Whether the dropdown is in loading state
    required: false
    default: false
  - name: disabled
    type: boolean
    description: Whether the dropdown is disabled
    required: false
    default: false
  - name: required
    type: boolean
    description: Whether a table selection is required
    required: false
    default: false
  - name: placeholder
    type: string
    description: Placeholder text for the dropdown
    required: false
    default: "Search table"
  - name: validationMessage
    type: string
    description: Validation message to show when required field is empty
    required: false
    default: ""
  - name: width
    type: string
    description: Width of the dropdown component
    required: false
    default: "184px"
  - name: includeEmailsSent
    type: boolean
    description: Whether to include the special "EmailsSent" table option
    required: false
    default: false
  - name: useDisplayName
    type: boolean
    description: Whether to use displayName field for labels (true) or caption field (false)
    required: false
    default: false
usage: |
  This component consolidates the table dropdown logic used across GallerySettings and GridSettings.
  It handles the different table property naming conventions (displayName vs caption) and optional
  special tables like EmailsSent.