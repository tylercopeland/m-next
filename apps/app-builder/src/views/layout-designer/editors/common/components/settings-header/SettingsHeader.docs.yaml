componentName: SettingsHeader
description: A comprehensive header component for settings and configuration pages. Combines breadcrumb navigation, action menu, and delete functionality with confirmation dialog. Features keyboard navigation, customizable messaging, and flexible action handling.

dependencies:
  - React
  - '@m-next/bread-crumbs' # BreadCrumbHeader component
  - '@m-next/svg-icon' # SvgIcon component
  - '@m-next/styles' # colors
  - '@m-next/dialog' # Dialog component
  - '@m-next/container' # Container component
  - '@m-next/typeography' # Text, TextLine components
  - '@m-next/menu' # IconMenuList, MenuItem components

props:
  required:
    crumbs:
      type: array
      description: Breadcrumb navigation items
      structure: |
        [{
          id: string,      # Unique identifier
          label: string,   # Display text
          onClick?: function  # Click handler (optional)
        }]

  optional:
    actions:
      type: array
      description: Available actions in the dropdown menu
      default: []
      structure: |
        [{
          label: string,     # Display text
          value: string,     # Unique identifier
          disabled?: boolean # Whether action is disabled
        }]
    
    contextType:
      type: string
      description: Type of item being managed (used in delete dialog)
      default: "item"
    
    contextLabel:
      type: string
      description: Specific label for the current item
      default: ""
    
    onActionSelect:
      type: function
      description: Callback when an action is selected from the menu
      default: () => {}
    
    showDeleteIcon:
      type: boolean
      description: Whether to show the delete trash icon
      default: false
    
    deleteDialogTitle:
      type: string
      description: Title for the delete confirmation dialog
      default: "Delete item"
    
    deleteDialogMessage:
      type: string | node
      description: Message content for delete confirmation (can be JSX)
      default: "Are you sure you want to delete this item?"
    
    onDelete:
      type: function
      description: Callback when delete is confirmed
      default: () => {}
    
    menuWidth:
      type: string
      description: Width of the actions dropdown menu
      default: "200px"

behavior:
  - Displays breadcrumb navigation for page hierarchy
  - Shows dropdown menu with available actions (when actions provided)
  - Optional delete icon with confirmation dialog
  - Keyboard navigation support for menu items
  - Automatic menu closing after action selection
  - Flexible delete message formatting (string or JSX)

keyboard_navigation:
  menu_control:
    tab_escape: "Close menu and lose focus"
    enter: "Open menu or select highlighted item"
    up_down: "Navigate between menu items"
    home_end: "Jump to first/last menu item"
  
  interaction_flow:
    closed_menu: "Enter opens menu and highlights first item"
    open_menu: "Arrow keys navigate, Enter selects, Tab/Escape closes"

sections:
  breadcrumbs:
    component: "BreadCrumbHeader"
    purpose: "Navigation hierarchy display"
    interaction: "Click handlers for navigation"
  
  actions_menu:
    component: "IconMenuList with MenuItem children"
    trigger: "Three-dot menu icon"
    features: "Dropdown with keyboard navigation"
    conditional: "Only renders when actions array is provided"
  
  delete_icon:
    component: "SvgIcon with trash icon"
    trigger: "Click opens confirmation dialog"
    conditional: "Only renders when showDeleteIcon is true"
  
  delete_dialog:
    component: "Dialog with confirmation buttons"
    content: "Customizable message (string or JSX)"
    actions: "Delete and Cancel buttons"

styling:
  layout: "Horizontal flex layout with space between elements"
  menu_alignment: "Right-aligned dropdown menu"
  icon_states: "Hover effects on interactive icons"
  responsive: "Adapts to different screen sizes"

usage_scenarios:
  - Settings page headers with contextual actions
  - Configuration panel navigation
  - Admin interface headers with delete functionality
  - Form editor headers with save/publish actions
  - Dashboard management interfaces
  - User management pages with bulk actions

example_usage:
  basic_settings_header:
    code: |
      <SettingsHeader
        crumbs={[
          { id: "dashboard", label: "Dashboard", onClick: navigateToDashboard },
          { id: "settings", label: "Settings", onClick: navigateToSettings },
          { id: "users", label: "User Management" }
        ]}
        actions={[
          { label: "Add User", value: "add" },
          { label: "Export Users", value: "export" },
          { label: "Import Users", value: "import", disabled: !canImport }
        ]}
        onActionSelect={handleActionSelect}
        showDeleteIcon={false}
      />
  
  form_editor_header:
    code: |
      <SettingsHeader
        crumbs={[
          { id: "forms", label: "Forms", onClick: navigateToForms },
          { id: "edit", label: formName || "Edit Form" }
        ]}
        actions={[
          { label: "Save Draft", value: "save" },
          { label: "Publish", value: "publish", disabled: !isValid },
          { label: "Preview", value: "preview" },
          { label: "Duplicate", value: "duplicate" }
        ]}
        onActionSelect={handleFormAction}
        showDeleteIcon={true}
        deleteDialogTitle="Delete Form"
        deleteDialogMessage={`Are you sure you want to delete "${formName}"? This action cannot be undone.`}
        onDelete={handleDeleteForm}
        contextType="form"
        contextLabel={formName}
      />
  
  user_profile_header:
    code: |
      <SettingsHeader
        crumbs={[
          { id: "users", label: "Users", onClick: navigateToUsers },
          { id: "profile", label: user.name }
        ]}
        actions={[
          { label: "Reset Password", value: "reset-password" },
          { label: "Send Invitation", value: "send-invite" },
          { label: "View Activity", value: "view-activity" }
        ]}
        onActionSelect={handleUserAction}
        showDeleteIcon={true}
        deleteDialogMessage={
          <div>
            <TextLine>Deleting user <Text bold>{user.name}</Text> will:</TextLine>
            <ul>
              <li>Remove all user data</li>
              <li>Cancel active sessions</li>
              <li>Transfer ownership of shared items</li>
            </ul>
            <TextLine>This action cannot be undone.</TextLine>
          </div>
        }
        onDelete={handleDeleteUser}
        contextType="user"
        contextLabel={user.name}
        menuWidth="180px"
      />
  
  minimal_navigation:
    code: |
      <SettingsHeader
        crumbs={[
          { id: "home", label: "Home", onClick: navigateHome },
          { id: "config", label: "Configuration" }
        ]}
      />

delete_dialog_variations:
  simple_message: "String message for basic confirmation"
  complex_message: "JSX content for rich formatting with lists, styling"
  contextual_message: "Dynamic message using contextType and contextLabel"
  custom_title: "Override default 'Delete {contextType}' title"

action_handling:
  selection: "onActionSelect receives full action object"
  disabled_actions: "Disabled actions don't trigger callbacks"
  menu_closing: "Menu automatically closes after selection"
  keyboard_support: "Full keyboard navigation for accessibility"

accessibility:
  - Breadcrumb navigation with proper link semantics
  - Keyboard navigation for dropdown menu
  - Focus management for menu interactions
  - Screen reader compatible action descriptions
  - Proper ARIA attributes for menu states
  - Dialog accessibility with focus trapping

implementation_details:
  - State management for menu open/close and active item
  - Keyboard event handling with key code constants
  - Conditional rendering based on props
  - Dialog state management for delete confirmation
  - Flexible message rendering (string vs JSX)
  - Menu positioning with customizable width