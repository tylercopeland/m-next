componentName: EditorInput
description: A form input component that combines a label and a debounced input field in a horizontal layout. Supports various input types and validation features.

dependencies:
  - React
  - "@emotion/styled"
  - "@m-next/typeography" # Text component
  - "@m-next/input" # DebouncedInput component
  - "@m-next/svg-icon" # SvgIcon component
  - "@m-next/styles" # colors

props:
  required:
    id:
      type: string
      description: Unique identifier for the input field, used for accessibility and form management

    value:
      type: string | number | object
      description: Current value of the input field

    controlId:
      type: string
      description: Identifier used to track when inputs should be reset to initial values

    onChange:
      type: function
      description: Callback function that receives the new value when input changes

  optional:
    label:
      type: string
      description: Text label displayed next to the input field
      default: null

    maxLength:
      type: number
      description: Maximum allowed length for text inputs or maximum value for number inputs
      default: 30

    align:
      type: string
      description: Vertical alignment of the label and input elements
      default: "baseline"
      options: ["baseline", "center", "flex-start", "flex-end"]

    gap:
      type: number
      description: Spacing between the label and input field in pixels
      default: 16

    required:
      type: boolean
      description: Whether the input is required for form validation
      default: false

    suffixText:
      type: string
      description: Text to display after the input value (e.g., "px", "%")
      default: null

    type:
      type: string
      description: Input type that determines validation behavior
      default: "text"
      options: ["text", "number", "integer"]

    disabled:
      type: boolean
      description: Whether the input is disabled and cannot be edited
      default: false

    width:
      type: string
      description: CSS width value for the input field
      default: "184px"

    showChildIcon:
      type: boolean
      description: Whether to display a hierarchical relationship indicator icon
      default: false

behavior:
  - Automatically enforces maxLength constraints for both text and numeric inputs
  - Maintains an initial value to prevent blank submissions
  - Displays different validation messages depending on the input type
  - For number/integer types, maxLength represents maximum value rather than character count
  - Provides an optional suffix text display (e.g., "px" for pixel values)
  - Uses debounced input to improve performance by delaying onChange events

styling:
  layout: Horizontal layout with label on left, input on right
  alignment: Configurable via the align prop
  spacing: Configurable via the gap prop
  width: Input width configurable via width prop

usage_scenarios:
  - Form fields requiring labels and validation
  - Property editors with constrained values
  - Configuration panels where debouncing improves performance
  - Hierarchical settings menus (when showChildIcon is true)

example_usage:
  basic_text:
    code: |
      <EditorInput
        id='header'
        value={column.header}
        label='Header title'
        onChange={handleHeaderChange}
        controlId={column.field}
        maxLength={100}
        required
      />

  numeric_with_suffix:
    code: |
      <EditorInput
        id='width'
        value={column.format.widthFixed}
        onChange={(e) => handleChildPropertyChange('format', 'widthFixed', e)}
        controlId={column.field}
        maxLength={400}
        required
        suffixText='px'
        type='number'
      />

implementation_details:
  - Uses a styled LineWrapper to manage horizontal layout
  - Integrates with DebouncedInput for delayed onChange events
  - Maintains internal state to track initial values
  - Generates appropriate validation messages based on input type and value
  - Supports showing hierarchical relationships with optional arrow-elbow icon
