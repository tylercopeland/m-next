<div data-ng-controller="UpdateControlsCtrl">
    <mi-action-description info="action"></mi-action-description>
    <!-- Main Content Area -->
    <div class="mi-ae-main-content">
        <div class="mi-ae-row">
            <div class="mi-ae-col-6">
                <label class="mi-ae-label mi-ae-margin-b-0">Control to update</label>
            </div>
            <div class="mi-ae-col-8">
                <label class="mi-ae-label mi-ae-margin-b-0">Update control using this value</label>
            </div>
        </div>
        <div class="mi-ae-row table-row" data-ng-class="{'alt-row': $odd}" data-ng-repeat="item in action.ControlsToUpdate">
            <div class="mi-ae-col-6" mi-validation-class="item.ValidationMessages" error-property="'ControlId'">
                <ui-select data-ng-model="item.id" theme="selectize" on-select="itemSelection($select.selected, item)" ng-disabled="action.isReadOnly">
                    <ui-select-match placeholder="Select...">{{$select.selected.label}}</ui-select-match>
                    <ui-select-choices group-by="'typeLabel'" repeat="opt.id as opt in controlList | orderBy: 'typeLabel+label' | filter: controlFilter(item) | filter: $select.search">
                        <span ng-bind-html="opt.label | highlight:$select.search"></span>
                    </ui-select-choices>
                </ui-select>
            </div>
            <div class="mi-ae-col-8">
                <mi-complex-value action="action"
                                  model="item.Source"
                                  allow="allow"
                                  included-types="item.includedTypes"
                                  error-code="item.Source.ValidationMessage"
                                  ignore-default=true
                                  force-allow="[0,2]" is-read-only ="action.isReadOnly"></mi-complex-value>
            </div>
            <div class="mi-ae-col-2" data-ng-if="action.ControlsToUpdate.length>1 && !action.isReadOnly">
                <miae-button 
                    button-class="'ghost mi-button-clear mi-ae-margin-0'" 
                    clickevent="removeItem($index)"
                    svg-icon-type="'delete'" 
                    svg-icon-size="14"></miae-button>
            </div>
        </div>
        <miae-button name="' Add another control'" 
                   data-ng-if="action.ControlsToUpdate.length < controlTotal && !action.isReadOnly"
                   button-class="'ghost mi-button-clear'"
                   clickevent="addItem()"
                   svg-icon-type="'circle-plus'" 
                   svg-icon-size="14"></miae-button>
    </div>
    <!--/ Main Content Area -->
     <mi-action-notes  is-read-only ="action.isReadOnly"></mi-action-notes>
</div>
