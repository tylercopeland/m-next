<div data-ng-controller="RetrieveExchangeRateCtrl">
  <mi-action-description info="action"></mi-action-description>

  <!-- Main Content Area -->
  <div class="mi-ae-main-content">
    <div class="mi-ae-section mi-ae-border-bottom mi-ae-margin-b-10">
      <!-- Field List -->
      <div class="mi-ae-row">
        <div class="mi-ae-col-4">
          <label class="mi-ae-label">Currency</label>
        </div>
        <div class="mi-ae-col-10">
          <mi-complex-value action="action" model="action.CurrencyCode" allow="allowCurr" is-read-only="action.isReadOnly"> </mi-complex-value>
        </div>
      </div>

      <div class="mi-ae-row">
        <div class="mi-ae-col-4">
          <label class="mi-ae-label">Using this date</label>
        </div>
        <div class="mi-ae-col-10">
          <mi-complex-value action="action" model="action.AsOfDate" allow="allow" is-read-only="action.isReadOnly"> </mi-complex-value>
        </div>
      </div>
      <!--/ Field List -->
      <!-- Result -->
      <mi-result-to-set
        label="'Place the value here'"
        action="action"
        include-controls="true"
        control="action.ControlToUpdate"
        control-model="action.ControlToUpdate"
        controls-ignore="['SEC', 'DOC']"
        item="action.ResultToSet"
        is-read-only="action.isReadOnly"
      ></mi-result-to-set>
      <!-- / Result -->
    </div>
  </div>
  <!--/ Main Content Area -->

  <mi-action-notes is-read-only="action.isReadOnly"></mi-action-notes>
</div>
