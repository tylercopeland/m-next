componentName: Button
description: A versatile button component with multiple styling variants, icon support, and accessibility features. Supports different design versions, custom styling, tooltips, and dangerous HTML rendering for special cases.

dependencies:
  - React
  - '@m-next/svg-icon' # SvgIcon component
  - '@m-next/styles' # colors, convertClass utilities

props:
  required:
    id:
      type: string
      description: Unique identifier for the button element

  optional:
    buttonStyle:
      type: string
      description: Visual style variant for the button
      default: "primary"
      options: ["primary", "link", "v4-primary", "ghost", "plain", "radio", "radio-selected"]
    
    classes:
      type: array
      description: Array of CSS class names to apply
      default: []
    
    className:
      type: string
      description: Additional CSS class name
      default: ""
    
    disabled:
      type: boolean
      description: Whether the button is disabled and non-interactive
      default: false
    
    isMobile:
      type: boolean
      description: Mobile-optimized styling and behavior
      default: false
    
    isV4Design:
      type: boolean
      description: Use version 4 design styling
      default: true
    
    onClick:
      type: function
      description: Callback function when button is clicked
      default: null
    
    tabIndex:
      type: number
      description: Tab order for keyboard navigation
      default: 0
    
    type:
      type: string
      description: HTML button type attribute
      default: "button"
    
    value:
      type: string
      description: Text content displayed on the button
      default: null
    
    visible:
      type: boolean
      description: Whether the button is visible
      default: true
    
    width:
      type: number | string
      description: Width of the button
      default: null
    
    widthType:
      type: string
      description: Width behavior type
      default: "auto"
    
    icon:
      type: object
      description: Icon configuration for the button
      default: null
      structure: |
        {
          name: string,        # Icon name
          size: number,        # Icon size in pixels
          color: string,       # Icon color
          position: "left" | "right"  # Icon position
        }
    
    forwardRef:
      type: object
      description: React ref to forward to the button element
      default: null
    
    style:
      type: object
      description: Custom styles for the button
      default: null
    
    isDangerous:
      type: boolean
      description: Enable dangerous HTML rendering (use with caution)
      default: false
    
    tooltip:
      type: string
      description: Tooltip text to display on hover
      default: null
    
    tooltipId:
      type: string
      description: ID for the tooltip element
      default: null
    
    backgroundColor:
      type: string
      description: Custom background color (color name or hex)
      default: null
    
    color:
      type: string
      description: Custom text color (color name or hex)
      default: null
    
    borderColor:
      type: string
      description: Custom border color (color name or hex)
      default: null
    
    fontSize:
      type: string
      description: Custom font size
      default: null
    
    size:
      type: string
      description: Size variant for the button
      default: "medium"
      options: ["small", "medium"]

behavior:
  - Prevents default click behavior and stops event propagation
  - Automatically blurs button after click to prevent focus retention
  - Supports keyboard navigation with configurable tab index
  - Handles icon positioning (left or right of text)
  - Can render icon-only buttons when no text value is provided
  - Dangerous mode allows HTML content rendering (use with extreme caution)
  - Color mapping from theme color names to actual color values

styling:
  variants:
    primary: Standard primary button styling
    link: Link-style button appearance
    v4-primary: Version 4 primary button styling
    ghost: Transparent background with border
    plain: Minimal styling
    radio: Radio button appearance
    radio-selected: Selected radio button appearance
  customization: Supports color, background, border, and font size overrides
  responsive: Mobile-optimized layouts when isMobile is true

usage_scenarios:
  - Form submission and actions
  - Navigation and routing
  - Modal dialog controls
  - Toolbar and menu actions
  - Icon-only action buttons
  - Special cases requiring HTML content rendering

example_usage:
  basic_button:
    code: |
      <Button
        id="submit-btn"
        value="Submit Form"
        buttonStyle="primary"
        onClick={handleSubmit}
        type="submit"
      />
  
  button_with_icon:
    code: |
      <Button
        id="save-btn"
        value="Save"
        buttonStyle="primary"
        icon={{
          name: "save",
          size: 16,
          color: "white",
          position: "left"
        }}
        onClick={handleSave}
      />
  
  icon_only_button:
    code: |
      <Button
        id="close-btn"
        buttonStyle="ghost"
        icon={{
          name: "close",
          size: 20,
          color: "grey"
        }}
        onClick={handleClose}
        tooltip="Close dialog"
        tooltipId="close-tooltip"
      />
  
  custom_styled_button:
    code: |
      <Button
        id="custom-btn"
        value="Custom Style"
        buttonStyle="plain"
        backgroundColor="blue-light"
        color="white"
        borderColor="blue"
        fontSize="14px"
        width="200px"
        onClick={handleClick}
      />
  
  disabled_button:
    code: |
      <Button
        id="disabled-btn"
        value="Processing..."
        buttonStyle="primary"
        disabled={true}
        onClick={handleProcess}
      />
  
  link_style_button:
    code: |
      <Button
        id="link-btn"
        value="View Details"
        buttonStyle="link"
        onClick={handleViewDetails}
        icon={{
          name: "arrow-right",
          size: 12,
          position: "right"
        }}
      />

security_considerations:
  dangerous_html:
    description: "The isDangerous prop allows HTML content rendering"
    warning: "Only use isDangerous with trusted content to prevent XSS attacks"
    use_case: "Legacy support for existing customer implementations"

implementation_details:
  - Uses styled-components for theming and styling
  - Integrates with design system color palette
  - Supports ref forwarding for programmatic access
  - Handles focus management and accessibility
  - Color mapping supports both theme color names and direct color values
  - Event handling includes prevention of default behavior
  - Conditional rendering based on isDangerous flag for security